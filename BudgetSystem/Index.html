<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АЦК - Вход</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>АЦК-Финансы v3.0</h1>
                <p>Автоматизированная система контроля бюджета</p>
            </div>
            <form id="loginForm">
                <div class="form-group"><label>Логин</label><input type="text" id="username" placeholder="Введите логин" required></div>
                <div class="form-group"><label>Пароль</label><input type="password" id="password" placeholder="Введите пароль" required></div>
                <button type="submit" class="btn-login">Войти в систему</button>
            </form>
            <div id="error" class="error-message"></div>
            <div style="text-align:center;margin-top:15px;color:#666;font-size:12px;">Демо: admin / 12345</div>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (data.status === 'ok') {
                    localStorage.setItem('user', JSON.stringify(data));
                    window.location.href = '/dashboard.html';
                } else {
                    document.getElementById('error').textContent = 'Неверный логин или пароль';
                }
            } catch(e) {
                document.getElementById('error').textContent = 'Нет соединения с сервером';
            }
        });
    </script>
</body>
</html>
